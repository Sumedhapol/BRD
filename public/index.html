<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Burnout Risk Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="top-ribbon">
    <div class="ribbon-content">
      <h1>Burnout Risk Dashboard</h1>
      <p>Student Wellness Tracker</p>
    </div>
  </header>

  <main class="page-container">
    <section id="authSection" class="auth-section">
      <div class="auth-card">
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Email" />
        <input type="password" id="loginPassword" placeholder="Password" />
        <button onclick="login()">Login</button>

        <h2>Create Account</h2>
        <input type="text" id="registerName" placeholder="Name" />
        <input type="email" id="registerEmail" placeholder="Email" />
        <input type="password" id="registerPassword" placeholder="Password" />
        <button onclick="register()">Register</button>
      </div>
    </section>

    <section id="appSection" class="hidden">
      <div class="welcome-row">
        <h2 id="welcomeUser">Welcome</h2>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>

      <section class="dashboard-container">
        <div class="score-card">
          <h2>Your Burnout Risk</h2>
          <div id="scoreDisplay" class="score">0</div>
          <div id="riskLevel" class="risk-pill low">Low Risk</div>
          <p id="riskMessage" class="message">
            Enter your daily wellness information below to calculate your burnout score.
          </p>
        </div>

        <div class="form-card">
          <h2>Daily Wellness Check-In</h2>
          <form id="burnoutForm">
            <div class="form-group">
              <label for="sleep">Hours of Sleep</label>
              <input type="number" id="sleep" min="0" max="24" step="0.5" required />
            </div>

            <div class="form-group">
              <label for="stress">Stress Level (1–10)</label>
              <input type="number" id="stress" min="1" max="10" required />
            </div>

            <div class="form-group">
              <label for="study">Study Hours</label>
              <input type="number" id="study" min="0" max="24" step="0.5" required />
            </div>

            <div class="form-group">
              <label for="mood">Mood Score (1–10)</label>
              <input type="number" id="mood" min="1" max="10" required />
            </div>

            <div class="button-row">
              <button type="submit" class="primary-btn">Save Entry</button>
              <button type="button" class="secondary-btn" onclick="document.getElementById('burnoutForm').reset()">Reset</button>
            </div>
          </form>
        </div>
      </section>

      <section class="history-section">
        <div class="history-card">
          <h2>Past Scores</h2>
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Score</th>
                <th>Risk</th>
              </tr>
            </thead>
            <tbody id="historyTable"></tbody>
          </table>
        </div>

        <div class="history-card">
          <h2>Weekly Risk Graph</h2>
          <canvas id="riskChart"></canvas>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
